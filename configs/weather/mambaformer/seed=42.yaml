Architecture: "mambaformer"

Seed: 42

Setting: weather

Logger:
    save_dir: "experiments/"

ckpt_path: None

Checkpointer:
    save_top_k: 1
    save_last: True
    every_n_epochs: 1

Trainer:
#    strategy: 'ddp'
    accelerator: 'gpu'
    log_every_n_steps: 64
    devices: [1]  # 改动
    max_epochs: 50
    gradient_clip_val: 1

Data:
    train_batch_size: 16
    val_batch_size: 16
    test_batch_size: 16
    num_workers: 4

Task:
    loss:
        name: "MSE"

    context_length: 12
    target_length: 12
    n_stochastic_preds: 1
    metric: "MSE_w"
    optimization:
        optimizer:
            - name: AdamW
              args:
                  betas: [ 0.9, 0.999]
                  weight_decay: 0.01
              lr_per_sample: 0.00003125
        lr_shedule:
            - name: Cosine
              args:
                  t_initial: 50 #[2, 20, 50, 90]
                  lr_min: 0.000001
    n_log_batches: 2


Model:
    patch_size: 4
    n_image: 1
    n_hidden: 256
    context_length: 12
    target_length: 12
    input_size_h: 32
    input_size_w: 64
    mlp_ratio: 4
    n_out: 1
    n_heads: 8
    depth: 4
    drop: 0.0
    attn_drop: 0.0
    drop_path: 0.0
    act: "silu"








